<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1200" viewBox="0 0 2100 1200">
<rect width="2100" height="1200" fill="white" />
<defs>
<style>
.title { font: bold 26px Arial, "Noto Sans SC"; }
.chapter { fill:#f7fbff; stroke:#2b4c7e; stroke-width:1.4; rx:10; ry:10; }
.box { fill:#ffffff; stroke:#333; stroke-width:1.2; rx:8; ry:8; }
.text { font: 24px Arial, "Noto Sans SC"; }
.small { font: 18px Arial, "Noto Sans SC"; fill:#444; }
.line { stroke:#222; stroke-width:1.2; }
</style>
</defs>

<text x="1050" y="40" text-anchor="middle" class="title">基于肌肉驱动的生物力学人机交互系统</text>

<rect x="850" y="70" width="400" height="60" class="box" />
<text x="1050" y="105" text-anchor="middle" class="text">系统总体结构（论文章节体系）</text>

<line x1="1050" y1="130" x2="1050" y2="160" class="line" />

<!-- 第1章 绪论 -->
