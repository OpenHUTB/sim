<!--?xml version="1.0" encoding="UTF-8"?-->
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900">

<rect width="1800" height="900" fill="white"></rect>

<defs>
<style>
.title { font: bold 22px Arial, "Noto Sans SC"; }

.box { stroke:#333; stroke-width:1.2; rx:10; ry:10; }

.top { fill:#dbe9ff; stroke:#2b4c7e; }
.layer { fill:#fff6db; }
.green { fill:#dff3df; stroke:#3a7a3a; }

.text { font: 14px Arial, "Noto Sans SC"; }
.small { font: 12px Arial, "Noto Sans SC"; fill:#444; }

.line { stroke:#333; stroke-width:1.2; }
</style>
</defs>

<!-- TITLE -->
<rect x="750" y="20" width="300" height="50" class="box top"></rect>
<text x="900" y="52" text-anchor="middle" class="text">仿真器</text>

<!-- MAIN BRANCH LINE -->
<line x1="900" y1="70" x2="900" y2="120" class="line"></line>
<line x1="300" y1="120" x2="1500" y2="120" class="line"></line>

<!-- ================= LEFT ================= -->
<line x1="300" y1="120" x2="300" y2="160" class="line"></line>

<rect x="180" y="160" width="240" height="50" class="box layer"></rect>
<text x="300" y="190" text-anchor="middle" class="text">生物力学模型层类</text>

<line x1="300" y1="210" x2="300" y2="240" class="line"></line>

<rect x="180" y="240" width="240" height="50" class="box layer"></rect>
<text x="300" y="270" text-anchor="middle" class="text">食指指点上位模型</text>

<line x1="300" y1="290" x2="300" y2="320" class="line"></line>

<rect x="180" y="320" width="240" height="50" class="box green"></rect>
<text x="300" y="350" text-anchor="middle" class="text">用户自定义误差类</text>

<!-- ================= MIDDLE ================= -->
<line x1="900" y1="120" x2="900" y2="160" class="line"></line>

<rect x="780" y="160" width="240" height="50" class="box layer"></rect>
<text x="900" y="190" text-anchor="middle" class="text">交互任务层类</text>

<line x1="900" y1="210" x2="900" y2="240" class="line"></line>

<rect x="780" y="240" width="240" height="50" class="box layer"></rect>
<text x="900" y="270" text-anchor="middle" class="text">指点任务</text>

<line x1="900" y1="290" x2="900" y2="320" class="line"></line>

<rect x="780" y="320" width="240" height="50" class="box layer"></rect>
<text x="900" y="350" text-anchor="middle" class="text">跟踪任务</text>

<line x1="900" y1="370" x2="900" y2="400" class="line"></line>

<rect x="780" y="400" width="240" height="50" class="box green"></rect>
<text x="900" y="430" text-anchor="middle" class="text">用户自定义误差类</text>

<!-- ================= RIGHT ================= -->
<line x1="1500" y1="120" x2="1500" y2="160" class="line"></line>

<rect x="1380" y="160" width="240" height="50" class="box layer"></rect>
<text x="1500" y="190" text-anchor="middle" class="text">感知模块层类</text>

<line x1="1500" y1="210" x2="1500" y2="240" class="line"></line>

<rect x="1380" y="240" width="240" height="50" class="box layer"></rect>
<text x="1500" y="270" text-anchor="middle" class="text">视觉驱动-固定相机</text>

<line x1="1500" y1="290" x2="1500" y2="320" class="line"></line>

<rect x="1380" y="320" width="240" height="50" class="box layer"></rect>
<text x="1500" y="350" text-anchor="middle" class="text">本体感知-含末端位姿</text>

<line x1="1500" y1="370" x2="1500" y2="400" class="line"></line>

<rect x="1380" y="400" width="240" height="50" class="box green"></rect>
<text x="1500" y="430" text-anchor="middle" class="text">用户自定义感知通道</text>

<!-- ================= LEGEND ================= -->
<rect x="250" y="520" width="1300" height="120" fill="#f8f8f8" stroke="#ccc"></rect>

<rect x="280" y="550" width="20" height="12" fill="#dbe9ff" stroke="#2b4c7e"></rect>
<text x="310" y="560" class="small">仿真器顶层</text>

<rect x="420" y="550" width="20" height="12" fill="#fff6db" stroke="#333"></rect>
<text x="450" y="560" class="small">三大子模块类</text>

<rect x="580" y="550" width="20" height="12" fill="#fff6db" stroke="#333"></rect>
<text x="610" y="560" class="small">框架内置实现</text>

<rect x="760" y="550" width="20" height="12" fill="#dff3df" stroke="#3a7a3a"></rect>
<text x="790" y="560" class="small">用户自定义扩展</text>

<text x="900" y="600" text-anchor="middle" class="small">
说明：系统分为生物力学模型、交互任务与感知模块三大层级结构，支持用户自定义扩展接口
</text>

</svg>