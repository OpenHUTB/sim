<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1600" height="700" viewBox="0 0 1600 700">

<defs>
<style>
.title { font: bold 22px Arial, "Noto Sans SC"; }
.box { fill:#ffffff; stroke:#222; stroke-width:1.8; }
.subbox { fill:#f7faff; stroke:#2b5fab; stroke-width:1.5; }
.sum { fill:#f2f2f2; stroke:#222; stroke-width:1.5; }
.arrow { stroke:#222; stroke-width:1.6; fill:none; marker-end:url(#m); }
.text { font: 14px Arial, "Noto Sans SC"; }
.small { font: 12px Arial, "Noto Sans SC"; }
.group { fill:#f9f9f9; stroke:#ddd; }
</style>

<marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="#222"/>
</marker>

</defs>

<!-- TITLE -->
<text x="800" y="35" text-anchor="middle" class="title">
视觉引导下肌肉驱动方向盘控制系统（IEEE/Nature级闭环结构）
</text>

<!-- GROUP BACKGROUND -->
<rect x="60" y="90" width="1480" height="520" class="group"/>

<!-- TARGET -->
<rect x="120" y="160" width="180" height="70" class="box"/>
<text x="210" y="200" text-anchor="middle" class="text">目标轨迹 θ*(t)</text>

<!-- SUM -->
<circle cx="340" cy="195" r="28" class="sum"/>
<text x="340" y="200" text-anchor="middle" class="text">Σ</text>

<!-- error label -->
<text x="320" y="145" class="small">e(t)</text>

<!-- CONTROLLER (neural + muscle) -->
<rect x="420" y="150" width="240" height="90" class="box"/>
<text x="540" y="185" text-anchor="middle" class="text">操作者神经控制</text>
<text x="540" y="210" text-anchor="middle" class="small">u(t) 肌肉激活</text>

<!-- SIGNAL PROCESS -->
<rect x="700" y="150" width="240" height="90" class="box"/>
<text x="820" y="185" text-anchor="middle" class="text">信号处理与映射层</text>
<text x="820" y="210" text-anchor="middle" class="small">滤波 / 死区 / 增益 / 延迟</text>

<!-- MUSCLE MODEL -->
<rect x="980" y="150" width="240" height="90" class="box"/>
<text x="1100" y="185" text-anchor="middle" class="text">肌肉-骨骼动力学</text>
<text x="1100" y="210" text-anchor="middle" class="small">Hill模型 + MuJoCo</text>

<!-- OUTPUT -->
<rect x="1260" y="160" width="180" height="70" class="box"/>
<text x="1350" y="200" text-anchor="middle" class="text">θ(t)</text>

<!-- forward arrows -->
<line x1="300" y1="195" x2="312" y2="195" class="arrow"/>
<line x1="368" y1="195" x2="420" y2="195" class="arrow"/>
<line x1="660" y1="195" x2="700" y2="195" class="arrow"/>
<line x1="940" y1="195" x2="980" y2="195" class="arrow"/>
<line x1="1220" y1="195" x2="1260" y2="195" class="arrow"/>

<!-- FEEDBACK PATH -->
<path d="M1350 230 L1350 520 L210 520 L210 230" class="arrow"/>

<!-- feedback label -->
<text x="800" y="550" text-anchor="middle" class="small">
实时视觉反馈 + 角度反馈 θ(t) → 误差计算 e(t)
</text>

<!-- VISUAL MODULE -->
<rect x="700" y="330" width="240" height="80" class="subbox"/>
<text x="820" y="365" text-anchor="middle" class="text">视觉引导模块</text>
<text x="820" y="390" text-anchor="middle" class="small">目标/当前/误差显示</text>

<!-- link visual feedback -->
<line x1="820" y1="420" x2="820" y2="520" class="arrow"/>

<!-- error to sum return -->
<line x1="210" y1="520" x2="312" y2="195" class="arrow"/>

<!-- dashed conceptual links -->
<line x1="820" y1="240" x2="820" y2="330" stroke="#666" stroke-dasharray="5,4" stroke-width="1.2"/>

</svg>
