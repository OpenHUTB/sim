<svg width="1600" height="320" viewBox="0 0 1600 320" xmlns="http://www.w3.org/2000/svg">

<rect width="1600" height="320" fill="white"></rect>

<!-- Title -->
<text x="800" y="35" text-anchor="middle" font-size="26" font-weight="bold">
  控制信号处理流水线
</text>

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#333"></path>
  </marker>
</defs>

<!-- ========== ROW BLOCKS (compact) ========== -->

<!-- 1 -->
<rect x="60" y="70" width="220" height="110" rx="10" fill="#dbe9ff" stroke="#2f5d8c"></rect>
<text x="170" y="110" text-anchor="middle" font-size="16" font-weight="bold">原始激活</text>
<text x="170" y="140" text-anchor="middle" font-size="14">u(k)∈[0,1]</text>

<!-- 2 -->
<rect x="300" y="70" width="240" height="110" rx="10" fill="#fff1cc" stroke="#8c6d1f"></rect>
<text x="420" y="110" text-anchor="middle" font-size="16" font-weight="bold">EMA滤波</text>
<text x="420" y="140" text-anchor="middle" font-size="13">f=αu+(1-α)f_prev</text>

<!-- 3 -->
<rect x="560" y="70" width="240" height="110" rx="10" fill="#fff4d6" stroke="#8c6d1f"></rect>
<text x="680" y="110" text-anchor="middle" font-size="16" font-weight="bold">死区过滤</text>
<text x="680" y="135" text-anchor="middle" font-size="13">u_d = sgn(u_t)</text>
<text x="680" y="155" text-anchor="middle" font-size="13">max(|u_t|-th,0)</text>

<!-- 4 -->
<rect x="820" y="70" width="240" height="110" rx="10" fill="#e8f7e8" stroke="#2f7d44"></rect>
<text x="940" y="110" text-anchor="middle" font-size="16" font-weight="bold">非线性映射</text>
<text x="940" y="140" text-anchor="middle" font-size="13">y = Kp·g(u_d)</text>

<!-- 5 -->
<rect x="1080" y="70" width="240" height="110" rx="10" fill="#efe6ff" stroke="#6b57a5"></rect>
<text x="1200" y="110" text-anchor="middle" font-size="16" font-weight="bold">饱和限幅</text>
<text x="1200" y="140" text-anchor="middle" font-size="13">θ_cmd = sat(y,±θ_max)</text>

<!-- 6 -->
<rect x="1340" y="70" width="200" height="110" rx="10" fill="#e6fbfb" stroke="#2c7a7a"></rect>
<text x="1440" y="115" text-anchor="middle" font-size="16" font-weight="bold">输出</text>
<text x="1440" y="145" text-anchor="middle" font-size="13">θ_cmd</text>

<!-- arrows -->
<line x1="280" y1="125" x2="300" y2="125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>
<line x1="540" y1="125" x2="560" y2="125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>
<line x1="800" y1="125" x2="820" y2="125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>
<line x1="1060" y1="125" x2="1080" y2="125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>
<line x1="1320" y1="125" x2="1340" y2="125" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>

<!-- footnote (moved up!) -->
<text x="800" y="260" text-anchor="middle" font-size="15" fill="#444">
  每一级对应公式(2-12)~(2-15)，支持独立调参与故障定位
</text>

</svg>