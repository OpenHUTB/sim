<svg width="1400" height="420" viewBox="0 0 1400 420" xmlns="http://www.w3.org/2000/svg">

  <!-- 背景 -->
  <rect width="1400" height="420" fill="white"></rect>

  <!-- 标题 -->
  <text x="700" y="40" text-anchor="middle" font-size="26" font-weight="bold">
    控制信号处理流水线
  </text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#333"></path>
    </marker>
  </defs>

  <!-- ====== BOX STYLE FUNCTION (manually repeated) ====== -->

  <!-- 1 原始激活信号 -->
  <rect x="60" y="100" width="200" height="120" rx="10" fill="#d9e8f5" stroke="#4a6fa5"></rect>
  <text x="160" y="125" text-anchor="middle" font-size="16" font-weight="bold">原始激活信号</text>
  <text x="160" y="150" text-anchor="middle" font-size="13">u(k) ∈ [0,1]</text>
  <text x="160" y="170" text-anchor="middle" font-size="12">来自键盘 / 仿真</text>
  <text x="160" y="190" text-anchor="middle" font-size="12">含基线漂移、抖动</text>
  <text x="160" y="250" text-anchor="middle" font-size="12">输入</text>

  <!-- 2 EMA -->
  <rect x="290" y="100" width="200" height="120" rx="10" fill="#fff1d6" stroke="#c28c2c"></rect>
  <text x="390" y="125" text-anchor="middle" font-size="16" font-weight="bold">EMA 低通滤波</text>
  <text x="390" y="150" text-anchor="middle" font-size="13">f = αu + (1−α)f_prev</text>
  <text x="390" y="170" text-anchor="middle" font-size="12">α ∈ (0,1)</text>
  <text x="390" y="190" text-anchor="middle" font-size="12">抑制高频抖动</text>
  <text x="390" y="250" text-anchor="middle" font-size="12">第1级</text>

  <!-- 3 dead zone -->
  <rect x="520" y="100" width="200" height="120" rx="10" fill="#e9f6e9" stroke="#4c8c4a"></rect>
  <text x="620" y="125" text-anchor="middle" font-size="16" font-weight="bold">死区过滤</text>
  <text x="620" y="150" text-anchor="middle" font-size="13">u_d = sgn(u_f)</text>
  <text x="620" y="170" text-anchor="middle" font-size="12">max(|u_f|−u_th,0)</text>
  <text x="620" y="190" text-anchor="middle" font-size="12">消除零附近噪声</text>
  <text x="620" y="250" text-anchor="middle" font-size="12">第2级</text>

  <!-- 4 nonlinear gain -->
  <rect x="750" y="100" width="200" height="120" rx="10" fill="#eef7d7" stroke="#7a9b2e"></rect>
  <text x="850" y="125" text-anchor="middle" font-size="16" font-weight="bold">非线性增益映射</text>
  <text x="850" y="150" text-anchor="middle" font-size="13">y = K_p · g(u_d)</text>
  <text x="850" y="170" text-anchor="middle" font-size="12">小信号高灵敏</text>
  <text x="850" y="190" text-anchor="middle" font-size="12">大信号渐进饱和</text>
  <text x="850" y="250" text-anchor="middle" font-size="12">第3级</text>

  <!-- 5 saturation -->
  <rect x="980" y="100" width="200" height="120" rx="10" fill="#e8e0f5" stroke="#6b57a5"></rect>
  <text x="1080" y="125" text-anchor="middle" font-size="16" font-weight="bold">饱和限幅</text>
  <text x="1080" y="150" text-anchor="middle" font-size="13">θ_cmd = sat(y, ±θ_max)</text>
  <text x="1080" y="170" text-anchor="middle" font-size="12">防越界与机械碰撞</text>
  <text x="1080" y="190" text-anchor="middle" font-size="12">硬件安全边界</text>
  <text x="1080" y="250" text-anchor="middle" font-size="12">第4级</text>

  <!-- 6 output -->
  <rect x="1210" y="100" width="200" height="120" rx="10" fill="#dff3f3" stroke="#2d8f8f"></rect>
  <text x="1310" y="125" text-anchor="middle" font-size="16" font-weight="bold">下发至仿真</text>
  <text x="1310" y="150" text-anchor="middle" font-size="13">驱动肌肉仿生器</text>
  <text x="1310" y="170" text-anchor="middle" font-size="12">θ_cmd → 关节力矩</text>
  <text x="1310" y="190" text-anchor="middle" font-size="12">→ 方向盘转动</text>
  <text x="1310" y="250" text-anchor="middle" font-size="12">输出</text>

  <!-- arrows -->
  <line x1="260" y1="160" x2="290" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>
  <line x1="490" y1="160" x2="520" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>
  <line x1="720" y1="160" x2="750" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>
  <line x1="950" y1="160" x2="980" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>
  <line x1="1210" y1="160" x2="1240" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"></line>

  <!-- bottom note -->
  <text x="700" y="360" text-anchor="middle" font-size="14">
    每一级处理对应公式（2-12）~（2-15），可独立调整，便于实验对比与故障定位
  </text>

</svg>