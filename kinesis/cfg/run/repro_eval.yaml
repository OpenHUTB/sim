motion_id: 0
im_eval: True
test: True
headless: True
num_threads: 1
fast_forward: True

# Fixed evaluation protocol from the thesis:
# - deterministic order, no random sampling/start
# - full KIT test split by default
# - PD muscle-length control
num_motions: 500
random_start: False
random_sample: False
control_mode: "PD"

proprioceptive_inputs: ["root_height", "root_tilt", "local_body_pos", "local_body_rot", "local_body_vel", "local_body_ang_vel", "feet_contacts"]
task_inputs: ["diff_local_body_pos", "diff_local_vel", "local_ref_body_pos"]

xml_path: "data/xml/myolegs.xml"
motion_file: "data/kit_test_motion_dict.pkl"
smpl_data_dir: "data/smpl"
initial_pose_file: "data/initial_pose/initial_pose_test.pkl"
expert_path: ""

recording_biomechanics: False
deactivate_muscles: False
