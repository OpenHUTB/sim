<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg">
  <!-- 样式定义 -->
  <defs>
    <style>
      .layer-title {
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 18px;
        font-weight: bold;
        text-anchor: middle;
      }
      .module-box {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 1;
        rx: 8;
        ry: 8;
      }
      .module-text {
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 16px;
        text-anchor: middle;
      }
      .layer-container {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 1;
      }
    </style>
  </defs>

  <!-- 表现层容器 -->
  <rect class="layer-container" x="10" y="10" width="880" height="130"/>
  <text class="layer-title" x="450" y="40">表现层</text>
  
  <!-- 表现层模块 -->
  <rect class="module-box" x="30" y="60" width="170" height="60"/>
  <text class="module-text" x="115" y="95">VSCode 界面集成</text>
  
  <rect class="module-box" x="230" y="60" width="170" height="60"/>
  <text class="module-text" x="315" y="95">状态栏展示</text>
  
  <rect class="module-box" x="430" y="60" width="170" height="60"/>
  <text class="module-text" x="515" y="95">错误提示面板</text>
  
  <rect class="module-box" x="630" y="60" width="170" height="60"/>
  <text class="module-text" x="715" y="95">命令与菜单</text>

  <!-- 业务层容器 -->
  <rect class="layer-container" x="10" y="160" width="880" height="200"/>
  <text class="layer-title" x="450" y="195">业务层</text>
  
  <!-- 业务层模块 - 第一行 -->
  <rect class="module-box" x="100" y="220" width="170" height="60"/>
  <text class="module-text" x="185" y="255">代码智能补全</text>
  
  <rect class="module-box" x="320" y="220" width="170" height="60"/>
  <text class="module-text" x="405" y="255">实时错误检测</text>
  
  <rect class="module-box" x="540" y="220" width="170" height="60"/>
  <text class="module-text" x="625" y="255">多场景调试</text>
  
  <!-- 业务层模块 - 第二行 -->
  <rect class="module-box" x="100" y="300" width="170" height="60"/>
  <text class="module-text" x="185" y="335">环境打包部署</text>
  
  <rect class="module-box" x="320" y="300" width="170" height="60"/>
  <text class="module-text" x="405" y="335">状态栏交互</text>
  
  <rect class="module-box" x="540" y="300" width="170" height="60"/>
  <text class="module-text" x="625" y="335">API 加载器</text>

  <!-- 数据层容器（增加高度） -->
  <rect class="layer-container" x="10" y="380" width="880" height="130"/>
  <text class="layer-title" x="450" y="415">数据层</text>
  
  <!-- 数据层模块（调整位置确保在框内） -->
  <rect class="module-box" x="230" y="440" width="170" height="60"/>
  <text class="module-text" x="315" y="475">API 定义文件</text>
  
  <rect class="module-box" x="500" y="440" width="170" height="60"/>
  <text class="module-text" x="585" y="475">调试模板文件</text>
</svg>
  <line class="connector-line" x1="775" y1="100" x2="775" y2="130"/>
  <rect class="module-box" x="730" y="130" width="90" height="120" rx="3" ry="3"/>
  <text class="module-text" x="775" y="180">语法高亮增强模块</text>
</svg>
