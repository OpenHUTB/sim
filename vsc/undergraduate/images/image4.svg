<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%">
  <defs>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    
    <!-- 悬停阴影 -->
    <filter id="shadow-hover" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    
    <!-- 渐变背景 -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    
    <linearGradient id="cardBgHover" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    
    <!-- 层背景渐变 -->
    <linearGradient id="layerBg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    
    <linearGradient id="layerBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    
    <linearGradient id="layerBg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>

    <!-- 卡片模板 -->
    <g id="card">
      <rect x="0" y="0" width="180" height="60" rx="10" ry="10" 
            fill="url(#cardBg)" stroke="#334155" stroke-width="2"
            filter="url(#shadow)" class="card-bg"/>
      <rect x="0" y="0" width="180" height="60" rx="10" ry="10" 
            fill="none" stroke="#3b82f6" stroke-width="2.5" 
            opacity="0" class="card-border"/>
    </g>

    <!-- 层标题模板 -->
    <g id="layer-title">
      <text x="450" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="18" font-weight="700" fill="#1e293b" class="layer-label"/>
    </g>
  </defs>

  <!-- 整体背景 -->
  <rect width="900" height="520" fill="#f8fafc"/>
  
  <!-- 网格装饰 -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="520" fill="url(#grid)" opacity="0.3"/>

  <!-- ========== 表现层 ========== -->
  <g id="presentation-layer">
    <!-- 层背景 -->
    <rect x="20" y="10" width="860" height="140" rx="12" fill="url(#layerBg1)" stroke="#eab308" stroke-width="1.5" opacity="0.4"/>
    
    <!-- 层标题 -->
    <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
          font-size="17" font-weight="700" fill="#854d0e">表现层</text>
    
    <!-- 4个卡片 -->
    <g class="module-card" transform="translate(40, 60)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">VSCode 界面集成</text>
    </g>

    <g class="module-card" transform="translate(260, 60)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">状态栏展示</text>
    </g>

    <g class="module-card" transform="translate(480, 60)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">错误提示面板</text>
    </g>

    <g class="module-card" transform="translate(700, 60)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">命令与菜单</text>
    </g>
  </g>

  <!-- 层间连接线 -->
  <g opacity="0.5">
    <!-- 表现层 -> 业务层 -->
    <line x1="130" y1="150" x2="130" y2="190" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="350" y1="150" x2="350" y2="190" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="570" y1="150" x2="570" y2="190" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="790" y1="150" x2="790" y2="190" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5"/>
    
    <!-- 业务层 -> 数据层 -->
    <line x1="200" y1="380" x2="200" y2="420" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="450" y1="380" x2="450" y2="420" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="700" y1="380" x2="700" y2="420" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,5"/>
  </g>

  <!-- 连接节点 -->
  <g fill="#94a3b8">
    <circle cx="130" cy="170" r="3"/>
    <circle cx="350" cy="170" r="3"/>
    <circle cx="570" cy="170" r="3"/>
    <circle cx="790" cy="170" r="3"/>
    <circle cx="200" cy="400" r="3"/>
    <circle cx="450" cy="400" r="3"/>
    <circle cx="700" cy="400" r="3"/>
  </g>

  <!-- ========== 业务层 ========== -->
  <g id="business-layer">
    <!-- 层背景 -->
    <rect x="20" y="180" width="860" height="210" rx="12" fill="url(#layerBg2)" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
    
    <!-- 层标题 -->
    <text x="450" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
          font-size="17" font-weight="700" fill="#14532d">业务层</text>
    
    <!-- 第一行3个卡片 -->
    <g class="module-card" transform="translate(110, 240)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">代码智能补全</text>
    </g>

    <g class="module-card" transform="translate(360, 240)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">实时错误检测</text>
    </g>

    <g class="module-card" transform="translate(610, 240)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">多场景调试</text>
    </g>

    <!-- 第二行3个卡片 -->
    <g class="module-card" transform="translate(110, 320)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">环境打包部署</text>
    </g>

    <g class="module-card" transform="translate(360, 320)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">状态栏交互</text>
    </g>

    <g class="module-card" transform="translate(610, 320)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">API 加载器</text>
    </g>
  </g>

  <!-- ========== 数据层 ========== -->
  <g id="data-layer">
    <!-- 层背景 -->
    <rect x="20" y="410" width="860" height="100" rx="12" fill="url(#layerBg3)" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
    
    <!-- 层标题 -->
    <text x="450" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
          font-size="17" font-weight="700" fill="#1e3a8a">数据层</text>
    
    <!-- 2个卡片（居中） -->
    <g class="module-card" transform="translate(260, 460)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">API 定义文件</text>
    </g>

    <g class="module-card" transform="translate(510, 460)">
      <use href="#card" x="0" y="0"/>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="14" font-weight="600" fill="#1e293b">调试模板文件</text>
    </g>
  </g>

  <!-- 交互样式 -->
  <style>
    .module-card {
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .module-card:hover {
      transform: translateY(-4px);
    }
    .module-card:hover .card-bg {
      fill: url(#cardBgHover);
      filter: url(#shadow-hover);
      stroke: #3b82f6;
    }
    .module-card:hover .card-border {
      opacity: 1;
    }
    .module-card:active {
      transform: translateY(-2px);
    }
    text {
      pointer-events: none;
      user-select: none;
    }
  </style>

  <!-- 交互脚本 -->
  <script type="text/javascript">
    document.querySelectorAll('.module-card').forEach((card, index) => {
      const labels = [
        'VSCode 界面集成', '状态栏展示', '错误提示面板', '命令与菜单',
        '代码智能补全', '实时错误检测', '多场景调试',
        '环境打包部署', '状态栏交互', 'API 加载器',
        'API 定义文件', '调试模板文件'
      ];
      card.addEventListener('click', function() {
        console.log('点击了模块：' + labels[index]);
      });
    });
  </script>
</svg>
