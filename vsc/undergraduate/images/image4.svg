<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .layer-title {
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 18px;
        font-weight: bold;
        text-anchor: middle;
      }
      .module-box {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 1;
      }
      .module-text {
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 16px;
        text-anchor: middle;
      }
      .layer-container {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 1;
      }
    </style>
  </defs>

  <!-- 表现层 -->
  <rect class="layer-container" x="10" y="10" width="880" height="130"/>
  <text class="layer-title" x="450" y="40">表现层</text>
  
  <rect class="module-box" x="30" y="60" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="115" y="95">VSCode 界面集成</text>
  
  <rect class="module-box" x="230" y="60" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="315" y="95">状态栏展示</text>
  
  <rect class="module-box" x="430" y="60" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="515" y="95">错误提示面板</text>
  
  <rect class="module-box" x="630" y="60" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="715" y="95">命令与菜单</text>

  <!-- 业务层 -->
  <rect class="layer-container" x="10" y="160" width="880" height="200"/>
  <text class="layer-title" x="450" y="195">业务层</text>
  
  <rect class="module-box" x="100" y="220" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="185" y="255">代码智能补全</text>
  
  <rect class="module-box" x="320" y="220" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="405" y="255">实时错误检测</text>
  
  <rect class="module-box" x="540" y="220" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="625" y="255">多场景调试</text>
  
  <rect class="module-box" x="100" y="300" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="185" y="335">环境打包部署</text>
  
  <rect class="module-box" x="320" y="300" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="405" y="335">状态栏交互</text>
  
  <rect class="module-box" x="540" y="300" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="625" y="335">API 加载器</text>

  <!-- 数据层 -->
  <rect class="layer-container" x="10" y="380" width="880" height="130"/>
  <text class="layer-title" x="450" y="415">数据层</text>
  
  <rect class="module-box" x="230" y="440" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="315" y="475">API 定义文件</text>
  
  <rect class="module-box" x="500" y="440" width="170" height="60" rx="8" ry="8"/>
  <text class="module-text" x="585" y="475">调试模板文件</text>
</svg>
