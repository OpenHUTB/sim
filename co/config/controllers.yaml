zonghzuang:
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 50

  front_steer_position_controller:
    type: effort_controllers/JointPositionController
    joint: front_steer
    pid: {p: 10.0, i: 0.0, d: 0.1}

  back_steer_position_controller:
    type: effort_controllers/JointPositionController
    joint: back_steer
    pid: {p: 10.0, i: 0.0, d: 0.1}

  front_left_wheel_velocity_controller:
    type: effort_controllers/JointVelocityController
    joint: front_left_wheel
    pid: {p: 1.0, i: 0.0, d: 0.0}

  front_right_wheel_velocity_controller:
    type: effort_controllers/JointVelocityController
    joint: front_right_wheel
    pid: {p: 1.0, i: 0.0, d: 0.0}

  back_left_wheel_velocity_controller:
    type: effort_controllers/JointVelocityController
    joint: back_left_wheel
    pid: {p: 1.0, i: 0.0, d: 0.0}

  back_right_wheel_velocity_controller:
    type: effort_controllers/JointVelocityController
    joint: back_right_wheel
    pid: {p: 1.0, i: 0.0, d: 0.0}
